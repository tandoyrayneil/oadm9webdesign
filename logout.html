<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM LOGOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logout-box {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 40px 50px;
            border-radius: 16px;
            border: 1px solid rgba(225, 0, 0, 0.4);
            box-shadow: 0 0 30px rgba(225, 0, 0, 0.4);
            max-width: 500px;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 3rem;
            color: #ff3333;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #a0a5ad;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .action-btn {
            text-decoration: none;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 700;
            border: 1px solid rgba(225, 0, 0, 0.6);
            padding: 12px 25px;
            border-radius: 8px;
            background: rgba(225, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
            margin: 5px;
        }

        .action-btn:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        .secondary-btn {
            border-color: #444;
            background: rgba(255,255,255,0.05);
            color: #8c92ac;
        }

        .secondary-btn:hover {
            background: #444;
            box-shadow: 0 0 15px #fff;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="logout-box">
        <h1>SESSION TERMINATED</h1>
        <p>You have been safely logged out of Ray's System. For maximum security, please close this browser tab.</p>
        
    <button class="action-btn" onclick="window.close(); alert('Browser security blocked auto-closing. Please close this tab manually!');">CLOSE TAB</button>
        <a href="home1.html" class="action-btn secondary-btn">LOG BACK IN</a>
    </div>

</body>
</html>
